name: Google Sheets to PostgreSQL ETL

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:       
  push:
    branches: [main]
    paths:
      - "etl.py"
      - "requirements.txt"

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL
        env:
          SHEET_ID:            ${{ secrets.SHEET_ID }}
          WORKSHEET:           ${{ secrets.WORKSHEET }}
          GOOGLE_SA_KEY_JSON:  ${{ secrets.GOOGLE_SA_KEY_JSON }}
          PG_USER:             ${{ vars.PG_USER }}
          PG_PASSWORD:         ${{ vars.PG_PASSWORD }}
          PG_HOST:             ${{ vars.PG_HOST }}
          PG_PORT:             ${{ vars.PG_PORT }}
          PG_DB:               ${{ secrets.PG_DB }}
          PG_TABLE:            ${{ secrets.PG_TABLE }}
        run: python etl.py
